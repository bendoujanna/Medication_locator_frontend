name: Frontend CI

on:
  push:
    branches: [ main, master, holdrequest ]
  pull_request:
    branches: [ main, master, holdrequest ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/workspace/.github/actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Verify Production Build
        run: npm run build